<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Campus Voice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <span data-flash="{{ cat }}" data-flash-msg="{{ msg }}" style="display:none"></span>
  {% endfor %}
{% endwith %}
<div class="toast-container" id="toast-container"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="bi bi-megaphone-fill"></i></div>
      <div class="auth-logo-text">
        <h1>Campus Voice</h1>
        <p>Smart Complaint System</p>
      </div>
    </div>

    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join Campus Voice and make your voice heard.</p>

    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div class="input-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="Your full name" required autocomplete="name"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">College Email</label>
        <div class="input-wrap">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@college.edu" required autocomplete="email"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap" style="position:relative">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Min. 6 characters" required/>
          <button type="button" onclick="togglePassword('password','pw-icon')"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer">
            <i class="bi bi-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" id="confirm_password" name="confirm_password"
                 class="form-control" placeholder="Repeat password" required/>
        </div>
      </div>

      <button type="submit" class="btn-cv btn-primary-cv w-100 justify-content-center" style="padding:12px">
        <i class="bi bi-person-plus-fill"></i> Create Account
      </button>
    </form>

    <p class="text-center mt-4" style="font-size:13.5px;color:var(--muted)">
      Already registered?
      <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:600">Sign in</a>
    </p>
    <p class="text-center">
      <a href="{{ url_for('home') }}" style="font-size:13px;color:var(--muted);text-decoration:none">
        <i class="bi bi-arrow-left"></i> Back to home
      </a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
